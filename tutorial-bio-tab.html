<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Winfinity — Bio Tab Walkthrough</title>
<style>
  :root {
    --bg: #0a0d10;
    --panel: #12181d;
    --panel-2: #171f26;
    --border: #26313a;
    --text-primary: #eef1f4;
    --text-muted: #8b98a3;
    --text-faint: #5b6770;
    --accent: #ff9f43;
    --accent-dim: #b9762f;
    --accent-glow: rgba(255,159,67,0.5);
    --cyan: #3ad6d0;
    --cyan-dim: #1f7f7d;
    --cyan-glow: rgba(58,214,208,0.5);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text-primary);
    font-family: var(--sans); height: 100%; overflow: hidden;
  }
  body {
    background-image:
      linear-gradient(rgba(255,159,67,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,159,67,0.035) 1px, transparent 1px);
    background-size: 34px 34px;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; border-bottom: 1px solid var(--border); gap: 16px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.08em; color: var(--text-muted); }
  .brand strong { color: var(--accent); font-weight: 700; }
  .section-label { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.3s; }
  .section-label.sec-A { color: var(--accent); }
  .section-label.sec-B { color: var(--cyan); }
  .progress-track { flex: 1 1 220px; max-width: 360px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; display: flex; }
  .progress-fill { height: 100%; transition: width 0.35s ease; }
  .progress-fill.sec-A { background: var(--accent); }
  .progress-fill.sec-B { background: var(--cyan); }
  .step-count { font-family: var(--mono); font-size: 0.74rem; color: var(--text-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }

  .stage {
    flex: 1 1 auto; min-height: 0; display: flex; align-items: center; justify-content: center;
    gap: 40px; padding: 22px 28px; overflow: hidden;
  }
  @media (max-width: 780px) {
    .stage { flex-direction: column; gap: 14px; padding: 12px 16px; justify-content: flex-start; overflow-y: auto; }
  }

  .frame-wrap {
    position: relative; flex: 0 1 auto; height: 100%; max-height: 100%;
    width: min(46vw, 380px); max-width: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  @media (max-width: 780px) { .frame-wrap { height: 52vh; max-height: 52vh; width: 100%; } }
  .frame {
    position: relative; border-radius: 18px;
    box-shadow: 0 0 0 1px var(--border), 0 30px 70px rgba(0,0,0,0.6);
    overflow: hidden; background: #000;
  }
  .frame img { display: block; width: 100%; height: 100%; transition: opacity 0.16s ease; }
  .frame img.fading { opacity: 0; }

  .reticle { position: absolute; pointer-events: none; transition: left 0.35s cubic-bezier(.4,0,.2,1), top 0.35s cubic-bezier(.4,0,.2,1), width 0.35s cubic-bezier(.4,0,.2,1), height 0.35s cubic-bezier(.4,0,.2,1), opacity 0.2s; }
  .reticle::before, .reticle::after, .reticle i::before, .reticle i::after { content: ''; position: absolute; width: 16px; height: 16px; border-color: var(--accent); filter: drop-shadow(0 0 5px var(--accent-glow)); }
  .reticle::before { top: -2px; left: -2px; border-top: 2.5px solid; border-left: 2.5px solid; }
  .reticle::after { top: -2px; right: -2px; border-top: 2.5px solid; border-right: 2.5px solid; }
  .reticle i { position: absolute; inset: 0; }
  .reticle i::before { bottom: -2px; left: -2px; top: auto; right: auto; border-bottom: 2.5px solid; border-left: 2.5px solid; }
  .reticle i::after { bottom: -2px; right: -2px; top: auto; left: auto; border-bottom: 2.5px solid; border-right: 2.5px solid; }
  .reticle .fill { position: absolute; inset: 0; background: var(--accent); opacity: 0.08; border-radius: 3px; }
  @media (prefers-reduced-motion: reduce) { .reticle { transition: none; } }

  .caption {
    flex: 0 0 auto; width: 380px; max-width: 100%;
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 22px 24px; display: flex; flex-direction: column; gap: 10px;
  }
  @media (max-width: 780px) { .caption { width: 100%; } }
  .caption-tag { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.05em; color: var(--accent-dim); }
  .caption-title { font-size: 1.12rem; font-weight: 700; margin: 0; text-wrap: balance; letter-spacing: 0.01em; }
  .caption-text { font-size: 0.9rem; line-height: 1.55; color: var(--text-muted); margin: 0; max-width: 62ch; }

  .navbar {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 16px 22px; border-top: 1px solid var(--border);
  }
  .nav-btn {
    font-family: var(--sans); font-size: 0.84rem; font-weight: 600; letter-spacing: 0.01em;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text-primary);
    padding: 10px 22px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: border-color 0.15s, color 0.15s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn:focus-visible, .nav-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
  .nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #0a0d10; }
  .nav-btn.primary:hover { background: #ffb668; color: #0a0d10; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><strong>WINFINITY</strong> &nbsp;/&nbsp; Bio Tab Walkthrough</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span class="section-label" id="sectionLabel"></span>
      <span class="step-count" id="stepCount"></span>
    </div>
  </div>

  <div class="stage">
    <div class="frame-wrap" id="frameWrap">
      <div class="frame" id="frame">
        <img id="tourImg" alt="">
        <div class="reticle" id="reticle"><i></i><div class="fill"></div></div>
      </div>
    </div>
    <div class="caption">
      <span class="caption-tag" id="capTag"></span>
      <h2 class="caption-title" id="capTitle"></h2>
      <p class="caption-text" id="capText"></p>
    </div>
  </div>

  <div class="navbar">
    <button class="nav-btn" id="btnPrev">&larr; Prev</button>
    <button class="nav-btn primary" id="btnNext">Next &rarr;</button>
  </div>
</div>

const STEPS = [{"section":"A","img":"bi1","tag":"SYNC_STATUS","title":"Biometric Analytics","box":{"x":3,"y":8,"w":94,"h":10},"text":"Today's biometric header — entity protocol execution and biological data sync, for the date you're currently logging."},{"section":"A","img":"bi1","tag":"TEMPORAL_ENTITY_LOG","title":"Temporal Entity Log","box":{"x":3,"y":19,"w":94,"h":4.5},"text":"Tap to switch which date you're logging biometric data for."},{"section":"A","img":"bi1","tag":"ENTITY_IDENTITY","title":"Entity Identity","box":{"x":3,"y":24,"w":94,"h":4.5},"text":"Your name, age, sex, height, and goals — the core profile that powers every calculation across the app, from calorie targets to body fat %. We'll go through this in full next."},{"section":"A","img":"bi1","tag":"MOD_BIO_LOG_01","title":"Stress / Fatigue / Hunger","box":{"x":3,"y":33.5,"w":94,"h":19},"text":"Three quick 1–5 sliders for how you're feeling right now — the same ones End Day Log fills in, editable here too. Tap Initialize sync to save."},{"section":"A","img":"bi1","tag":"MOD_BIOSCAN_10","title":"Body measurement scan","box":{"x":3,"y":58,"w":94,"h":42},"text":"Should ideally be filled once a week, every Sunday morning, fasted — for a consistent, comparable reading. USER ENTRY opens the actual measurement form."},{"section":"B","img":"bi2","tag":"ENTITY_ID.photo","title":"Entity Identity — photo","box":{"x":2,"y":5,"w":96,"h":9},"text":"Upload a real photo or pick a stock avatar for your profile."},{"section":"B","img":"bi2","tag":"MOD_IO_CORE_01","title":"Entity Identity — basics","box":{"x":2,"y":15,"w":96,"h":20},"text":"Your display name, age, sex, and which units you log in (kg/lb, cm) — sex and age both feed directly into your body fat % and BMR/calorie calculations."},{"section":"B","img":"bi2","tag":"MOD_BIOM_02","title":"Entity Identity — body & activity","box":{"x":2,"y":36,"w":96,"h":27},"text":"Height, current weight, activity level, your Goal (Cutting/Bulking/Maintain), and how many sessions a week you train — all of it feeds your calorie/macro targets."},{"section":"B","img":"bi2","tag":"MOD_GOAL_03","title":"Entity Identity — goal weights & challenge","box":{"x":2,"y":64,"w":96,"h":15},"text":"Min Goal / Target / Dream give the app a realistic range rather than one fixed number — that's what powers the Goal Progress bar on Status. Challenge Start + Duration set your 100-day counter."},{"section":"B","img":"bi2","tag":"MOD_DAILY_04.auto","title":"Entity Identity — hydration","box":{"x":2,"y":80,"w":96,"h":19},"text":"Auto-compute hydration target daily factors in the weather, your logged training, and any health status below — leave it on unless you have a reason to set a fixed number yourself."},{"section":"B","img":"bi3","tag":"MOD_DAILY_04.goal","title":"Hydration Goal & Health status","box":{"x":2,"y":0,"w":96,"h":27},"text":"Health status (e.g. pregnant, illness) adds extra hydration on top of the base calculation — the note below always shows exactly what today's number is and why."},{"section":"B","img":"bi3","tag":"KINETIC_OUTPUT","title":"Kinetic Output (Steps)","box":{"x":2,"y":28,"w":96,"h":12},"text":"Your daily step goal — this is the target your Habit Completion ring and Recent Performance checks compare against."},{"section":"B","img":"bi3","tag":"MOD_EXT_05","title":"Custom Habit Protocols","box":{"x":2,"y":41,"w":96,"h":47},"text":"Up to 5 of your own habits (e.g. “FASTING_16_8”, “NO_CAFFEINE_PM”) — these are exactly what shows up as Extra Habits on the Status tab's check-in."},{"section":"B","img":"bi3","tag":"INIT_PROFILE_SYNC","title":"Initialize Profile Sync","box":{"x":2,"y":89,"w":96,"h":6},"text":"Saves everything on this whole Entity Identity sheet."},{"section":"B","img":"bi4","tag":"MEASURE_LOG.entry","title":"Measurement Log Entry — date","box":{"x":2,"y":47,"w":96,"h":8},"text":"Defaults to today — change it if you're logging a weekly measurement you took on a different day."},{"section":"B","img":"bi4","tag":"MOD_MEASURE_11","title":"Measurement Log Entry — fields","box":{"x":2,"y":56,"w":96,"h":42},"text":"Chest, shoulder, both biceps, three navel-area points, and both thighs/calves, all in cm to the nearest 0.1 — this is what powers your body measurement trend charts."},{"section":"B","img":"bi5","tag":"MOD_BODYFAT_05","title":"Body Fat % & Edema Extrapolation","box":{"x":2,"y":0,"w":96,"h":23},"text":"Body Fat % comes from your skinfold caliper entries (next step). Edema Extrapolation is a same-day water-retention estimate — neither one is something you type directly."},{"section":"B","img":"bi5","tag":"COACH.request","title":"Coach assignment","box":{"x":2,"y":29,"w":96,"h":12},"text":"Request Assessment sends your coach a snapshot of your progress so they can set (or update) your targets — covered in full at the end of this walkthrough."},{"section":"B","img":"bi5","tag":"MOD_COACH_07","title":"Assigned Targets (Optional Override)","box":{"x":2,"y":42,"w":96,"h":57},"text":"Once your coach reviews your assessment, they can set specific calorie, step, and workout targets here — including a refeed day — which then override your own computed targets for that date range."},{"section":"B","img":"bi6","tag":"CALIPER.method","title":"Caliper Entry Data — method","box":{"x":2,"y":22,"w":96,"h":8},"text":"Jackson-Pollock 7-Site skinfold method — pinch each site with skinfold calipers and enter the reading in mm. Both men and women are measured at the same seven locations."},{"section":"B","img":"bi6","tag":"CALIPER.fields","title":"Caliper Entry Data — the 7 sites","box":{"x":2,"y":31,"w":96,"h":64},"text":"Chest, abdomen, thigh, triceps, suprailiac, subscapular, and midaxillary — each field includes exactly where and how to pinch, so results stay consistent week to week."},{"section":"B","img":"bi6","tag":"CALIPER.save","title":"Save skinfold measurements","box":{"x":2,"y":95,"w":96,"h":4.5},"text":"Saves this week's readings and recalculates your Body Fat %."},{"section":"B","img":"bi7","tag":"REQUEST_ASSESS.checklist","title":"Request Assessment — what to include","box":{"x":3,"y":15,"w":94,"h":73},"text":"Pick exactly what your coach gets to see — every item here is optional, so you control how much of your data goes into the assessment."},{"section":"B","img":"bi7","tag":"REQUEST_ASSESS.share","title":"Request Assessment — Share","box":{"x":3,"y":89,"w":94,"h":9},"text":"Sends your selected data to your coach. This is the same request an admin can see and respond to from the public Progress Showcase."}];
const DIMS = {"bi1":[519,1250],"bi2":[504,1096],"bi3":[484,710],"bi4":[523,1135],"bi5":[508,937],"bi6":[507,928],"bi7":[525,580]};
let idx = 0;

const els = {
  img: document.getElementById('tourImg'),
  reticle: document.getElementById('reticle'),
  frame: document.getElementById('frame'),
  frameWrap: document.getElementById('frameWrap'),
  capTag: document.getElementById('capTag'),
  capTitle: document.getElementById('capTitle'),
  capText: document.getElementById('capText'),
  progressFill: document.getElementById('progressFill'),
  sectionLabel: document.getElementById('sectionLabel'),
  stepCount: document.getElementById('stepCount'),
  btnPrev: document.getElementById('btnPrev'),
  btnNext: document.getElementById('btnNext'),
};

let lastImgKey = null;

function fitFrame(imgKey) {
  const dim = DIMS[imgKey];
  if (!dim) return;
  const availW = els.frameWrap.clientWidth;
  const availH = els.frameWrap.clientHeight;
  if (!availW || !availH) return;
  const scale = Math.min(availW / dim[0], availH / dim[1]);
  els.frame.style.width = Math.round(dim[0] * scale) + 'px';
  els.frame.style.height = Math.round(dim[1] * scale) + 'px';
}

function render() {
  const step = STEPS[idx];
  if (step.img !== lastImgKey) {
    lastImgKey = step.img;
    fitFrame(step.img);
    if (!els.img.src) {
      els.img.src = IMAGES[step.img];
    } else {
      els.img.classList.add('fading');
      setTimeout(() => {
        els.img.src = IMAGES[step.img];
        els.img.classList.remove('fading');
      }, 160);
    }
  }

  els.reticle.style.left = step.box.x + '%';
  els.reticle.style.top = step.box.y + '%';
  els.reticle.style.width = step.box.w + '%';
  els.reticle.style.height = step.box.h + '%';

  els.capTag.textContent = step.tag;
  els.capTitle.textContent = step.title;
  els.capText.textContent = step.text;
  els.capTag.style.color = step.section === 'A' ? 'var(--accent-dim)' : 'var(--cyan-dim)';

  const pct = ((idx + 1) / STEPS.length) * 100;
  els.progressFill.style.width = pct + '%';
  els.progressFill.className = 'progress-fill sec-' + step.section;
  els.sectionLabel.textContent = step.section === 'A' ? 'Section A \u2014 Bio Tab Overview' : 'Section B \u2014 In Detail';
  els.sectionLabel.className = 'section-label sec-' + step.section;
  els.stepCount.textContent = String(idx + 1).padStart(2, '0') + ' / ' + String(STEPS.length).padStart(2, '0');

  els.btnPrev.disabled = idx === 0;
  els.btnNext.disabled = idx === STEPS.length - 1;
  els.btnNext.innerHTML = idx === STEPS.length - 1 ? 'Done' : 'Next &rarr;';
}

els.btnPrev.addEventListener('click', () => { if (idx > 0) { idx--; render(); } });
els.btnNext.addEventListener('click', () => { if (idx < STEPS.length - 1) { idx++; render(); } });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { if (idx < STEPS.length - 1) { idx++; render(); } }
  if (e.key === 'ArrowLeft') { if (idx > 0) { idx--; render(); } }
});
els.frame.addEventListener('click', () => { if (idx < STEPS.length - 1) { idx++; render(); } });
window.addEventListener('resize', () => fitFrame(STEPS[idx].img));

render();
</script>
