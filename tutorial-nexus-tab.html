<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Winfinity — Nexus Tab Walkthrough</title>
<style>
  :root {
    --bg: #0a0d10;
    --panel: #12181d;
    --panel-2: #171f26;
    --border: #26313a;
    --text-primary: #eef1f4;
    --text-muted: #8b98a3;
    --text-faint: #5b6770;
    --accent: #ff9f43;
    --accent-dim: #b9762f;
    --accent-glow: rgba(255,159,67,0.5);
    --cyan: #3ad6d0;
    --cyan-dim: #1f7f7d;
    --cyan-glow: rgba(58,214,208,0.5);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text-primary);
    font-family: var(--sans); height: 100%; overflow: hidden;
  }
  body {
    background-image:
      linear-gradient(rgba(255,159,67,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,159,67,0.035) 1px, transparent 1px);
    background-size: 34px 34px;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; border-bottom: 1px solid var(--border); gap: 16px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.08em; color: var(--text-muted); }
  .brand strong { color: var(--accent); font-weight: 700; }
  .section-label { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.3s; }
  .section-label.sec-A { color: var(--accent); }
  .section-label.sec-B { color: var(--cyan); }
  .progress-track { flex: 1 1 220px; max-width: 360px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; display: flex; }
  .progress-fill { height: 100%; transition: width 0.35s ease; }
  .progress-fill.sec-A { background: var(--accent); }
  .progress-fill.sec-B { background: var(--cyan); }
  .step-count { font-family: var(--mono); font-size: 0.74rem; color: var(--text-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }

  .stage {
    flex: 1 1 auto; min-height: 0; display: flex; align-items: center; justify-content: center;
    gap: 40px; padding: 22px 28px; overflow: hidden;
  }
  @media (max-width: 780px) {
    .stage { flex-direction: column; gap: 14px; padding: 12px 16px; justify-content: flex-start; overflow-y: auto; }
  }

  .frame-wrap {
    position: relative; flex: 0 1 auto; height: 100%; max-height: 100%;
    width: min(46vw, 380px); max-width: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  @media (max-width: 780px) { .frame-wrap { height: 52vh; max-height: 52vh; width: 100%; } }
  .frame {
    position: relative; border-radius: 18px;
    box-shadow: 0 0 0 1px var(--border), 0 30px 70px rgba(0,0,0,0.6);
    overflow: hidden; background: #000;
  }
  .frame img { display: block; width: 100%; height: 100%; transition: opacity 0.16s ease; }
  .frame img.fading { opacity: 0; }

  .reticle { position: absolute; pointer-events: none; transition: left 0.35s cubic-bezier(.4,0,.2,1), top 0.35s cubic-bezier(.4,0,.2,1), width 0.35s cubic-bezier(.4,0,.2,1), height 0.35s cubic-bezier(.4,0,.2,1), opacity 0.2s; }
  .reticle::before, .reticle::after, .reticle i::before, .reticle i::after { content: ''; position: absolute; width: 16px; height: 16px; border-color: var(--accent); filter: drop-shadow(0 0 5px var(--accent-glow)); }
  .reticle::before { top: -2px; left: -2px; border-top: 2.5px solid; border-left: 2.5px solid; }
  .reticle::after { top: -2px; right: -2px; border-top: 2.5px solid; border-right: 2.5px solid; }
  .reticle i { position: absolute; inset: 0; }
  .reticle i::before { bottom: -2px; left: -2px; top: auto; right: auto; border-bottom: 2.5px solid; border-left: 2.5px solid; }
  .reticle i::after { bottom: -2px; right: -2px; top: auto; left: auto; border-bottom: 2.5px solid; border-right: 2.5px solid; }
  .reticle .fill { position: absolute; inset: 0; background: var(--accent); opacity: 0.08; border-radius: 3px; }
  @media (prefers-reduced-motion: reduce) { .reticle { transition: none; } }

  .caption {
    flex: 0 0 auto; width: 380px; max-width: 100%;
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 22px 24px; display: flex; flex-direction: column; gap: 10px;
  }
  @media (max-width: 780px) { .caption { width: 100%; } }
  .caption-tag { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.05em; color: var(--accent-dim); }
  .caption-title { font-size: 1.12rem; font-weight: 700; margin: 0; text-wrap: balance; letter-spacing: 0.01em; }
  .caption-text { font-size: 0.9rem; line-height: 1.55; color: var(--text-muted); margin: 0; max-width: 62ch; }

  .navbar {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 16px 22px; border-top: 1px solid var(--border);
  }
  .nav-btn {
    font-family: var(--sans); font-size: 0.84rem; font-weight: 600; letter-spacing: 0.01em;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text-primary);
    padding: 10px 22px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: border-color 0.15s, color 0.15s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn:focus-visible, .nav-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
  .nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #0a0d10; }
  .nav-btn.primary:hover { background: #ffb668; color: #0a0d10; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><strong>WINFINITY</strong> &nbsp;/&nbsp; Nexus Tab Walkthrough</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span class="section-label" id="sectionLabel"></span>
      <span class="step-count" id="stepCount"></span>
    </div>
  </div>

  <div class="stage">
    <div class="frame-wrap" id="frameWrap">
      <div class="frame" id="frame">
        <img id="tourImg" alt="">
        <div class="reticle" id="reticle"><i></i><div class="fill"></div></div>
      </div>
    </div>
    <div class="caption">
      <span class="caption-tag" id="capTag"></span>
      <h2 class="caption-title" id="capTitle"></h2>
      <p class="caption-text" id="capText"></p>
    </div>
  </div>

  <div class="navbar">
    <button class="nav-btn" id="btnPrev">&larr; Prev</button>
    <button class="nav-btn primary" id="btnNext">Next &rarr;</button>
  </div>
</div>

const els = {
  img: document.getElementById('tourImg'),
  reticle: document.getElementById('reticle'),
  frame: document.getElementById('frame'),
  frameWrap: document.getElementById('frameWrap'),
  capTag: document.getElementById('capTag'),
  capTitle: document.getElementById('capTitle'),
  capText: document.getElementById('capText'),
  progressFill: document.getElementById('progressFill'),
  sectionLabel: document.getElementById('sectionLabel'),
  stepCount: document.getElementById('stepCount'),
  btnPrev: document.getElementById('btnPrev'),
  btnNext: document.getElementById('btnNext'),
};

let lastImgKey = null;

function fitFrame(imgKey) {
  const dim = DIMS[imgKey];
  if (!dim) return;
  const availW = els.frameWrap.clientWidth;
  const availH = els.frameWrap.clientHeight;
  if (!availW || !availH) return;
  const scale = Math.min(availW / dim[0], availH / dim[1]);
  els.frame.style.width = Math.round(dim[0] * scale) + 'px';
  els.frame.style.height = Math.round(dim[1] * scale) + 'px';
}

function render() {
  const step = STEPS[idx];
  if (step.img !== lastImgKey) {
    lastImgKey = step.img;
    fitFrame(step.img);
    if (!els.img.src) {
      els.img.src = IMAGES[step.img];
    } else {
      els.img.classList.add('fading');
      setTimeout(() => {
        els.img.src = IMAGES[step.img];
        els.img.classList.remove('fading');
      }, 160);
    }
  }

  els.reticle.style.left = step.box.x + '%';
  els.reticle.style.top = step.box.y + '%';
  els.reticle.style.width = step.box.w + '%';
  els.reticle.style.height = step.box.h + '%';

  els.capTag.textContent = step.tag;
  els.capTitle.textContent = step.title;
  els.capText.textContent = step.text;
  els.capTag.style.color = step.section === 'A' ? 'var(--accent-dim)' : 'var(--cyan-dim)';

  const pct = ((idx + 1) / STEPS.length) * 100;
  els.progressFill.style.width = pct + '%';
  els.progressFill.className = 'progress-fill sec-' + step.section;
  els.sectionLabel.textContent = step.section === 'A' ? 'Section A \u2014 Nexus Tab Overview' : 'Section B \u2014 In Detail';
  els.sectionLabel.className = 'section-label sec-' + step.section;
  els.stepCount.textContent = String(idx + 1).padStart(2, '0') + ' / ' + String(STEPS.length).padStart(2, '0');

  els.btnPrev.disabled = idx === 0;
  els.btnNext.disabled = idx === STEPS.length - 1;
  els.btnNext.innerHTML = idx === STEPS.length - 1 ? 'Done' : 'Next &rarr;';
}

els.btnPrev.addEventListener('click', () => { if (idx > 0) { idx--; render(); } });
els.btnNext.addEventListener('click', () => { if (idx < STEPS.length - 1) { idx++; render(); } });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { if (idx < STEPS.length - 1) { idx++; render(); } }
  if (e.key === 'ArrowLeft') { if (idx > 0) { idx--; render(); } }
});
els.frame.addEventListener('click', () => { if (idx < STEPS.length - 1) { idx++; render(); } });
window.addEventListener('resize', () => fitFrame(STEPS[idx].img));

render();
</script>
</body>
</html>
