<!-- Winfinity Progress Showcase embed for winfinityfitness.com (WordPress)
     -- paste this whole block into the Custom HTML widget/block wherever
     the showcase should appear, replacing whatever plain
     <iframe src="...showcase.html"> tag is there now.

     This version auto-resizes the iframe to match the page's real content
     height, via postMessage from showcase.html's own reporting script (see
     the small script block at the bottom of that file) -- so it never
     crops content behind an internal drag/scroll bar, regardless of how
     tall the page gets (e.g. the stat card opening below the chart when
     you hover a bar). min-height is just the pre-JS fallback shown for an
     instant before the first postMessage arrives. -->
<iframe id="wfShowcaseFrame" src="https://winfinityfitness.github.io/fitness-tracker/showcase.html"
        style="width:100%;border:0;display:block;min-height:640px;" loading="lazy"
        title="Winfinity Progress Showcase"></iframe>
<script>
window.addEventListener('message', function (e) {
  if (e.data && e.data.wfEmbedId === 'showcase' && typeof e.data.wfEmbedHeight === 'number') {
    var frame = document.getElementById('wfShowcaseFrame');
    if (frame) frame.style.height = e.data.wfEmbedHeight + 'px';
  }
});
</script>
