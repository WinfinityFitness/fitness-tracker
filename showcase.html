<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Winfinity Progress Showcase</title>
<style>
  :root {
    --bg: #0a0d12;
    --panel: #121820;
    --panel-2: #171f2a;
    --border: #232d3a;
    --text-primary: #e8ecf1;
    --text-muted: #8a97a8;
    --accent: #ff9f43;
    --accent-dim: #b9762f;
    --tier-elite: #ff9f43;
    --tier-ontrack: #4fd1c5;
    --tier-building: #7c8ba1;
    --tier-behind: #e0555a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow-x: hidden;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 40px; }
  header.hero { text-align: center; margin-bottom: 22px; }
  header.hero h1 {
    font-size: clamp(1.4rem, 3vw, 2rem); margin: 0 0 8px;
    letter-spacing: 0.02em;
  }
  header.hero h1 .accent { color: var(--accent); }
  header.hero p { color: var(--text-muted); margin: 0; font-size: 0.92rem; }

  .tabs {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 18px;
  }
  .tab-btn {
    background: var(--panel); color: var(--text-muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 8px 16px; font-size: 0.85rem; cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.is-active { color: #0a0d12; background: var(--accent); border-color: var(--accent); font-weight: 600; }

  .filter-row {
    display: flex; align-items: center; gap: 14px; justify-content: center;
    color: var(--text-muted); font-size: 0.82rem; margin-bottom: 18px; flex-wrap: wrap;
  }
  .sort-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .location-select {
    background: var(--panel); color: var(--text-primary); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 10px; font-size: 0.8rem; cursor: pointer;
  }
  .filter-range-group { display: flex; align-items: center; gap: 14px; }
  /* Dragging two overlapping range-slider thumbs is fiddly on a touchscreen
     and eats a lot of vertical space on narrow phones -- hidden below this
     width; the Sort/Hide toggles and location dropdown still work fine
     without it. */
  @media (max-width: 640px) {
    .filter-range-group { display: none; }
  }
  .filter-range { position: relative; width: 260px; height: 28px; }
  .filter-range input[type="range"] {
    position: absolute; left: 0; top: 9px; width: 100%; margin: 0;
    -webkit-appearance: none; appearance: none; background: transparent; pointer-events: none;
  }
  .filter-range input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; pointer-events: auto; width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg); cursor: pointer; margin-top: -6px;
  }
  .filter-range input[type="range"]::-webkit-slider-runnable-track { height: 3px; background: var(--border); border-radius: 2px; }
  .filter-range input[type="range"]::-moz-range-thumb {
    pointer-events: auto; width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg); cursor: pointer;
  }
  .filter-range input[type="range"]::-moz-range-track { height: 3px; background: var(--border); border-radius: 2px; }
  .filter-values { font-variant-numeric: tabular-nums; color: var(--text-primary); }

  .chart-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px 20px 8px;
  }
  .chart-card-head {
    display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px;
  }
  .chart-card-head h2 { font-size: 1rem; margin: 0; }
  .chart-card-head span { color: var(--text-muted); font-size: 0.8rem; }

  .legend { display: flex; gap: 16px; margin-bottom: 14px; font-size: 0.76rem; color: var(--text-muted); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

  .bars-scroll {
    display: flex; align-items: flex-end; gap: 5px; height: 220px;
    overflow-x: auto; padding: 0 4px 14px; scrollbar-width: thin;
  }
  .bars-scroll::-webkit-scrollbar { height: 6px; }
  .bars-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .showcase-bar {
    flex: 0 0 auto; width: 5px; min-height: 4px; border-radius: 3px 3px 0 0;
    border: none; cursor: pointer; position: relative;
    transition: opacity 0.15s, transform 0.1s;
  }
  .showcase-bar:hover, .showcase-bar:focus-visible { transform: scaleX(1.6); outline: none; }
  .showcase-bar.is-filtered-out { opacity: 0.12; pointer-events: none; }
  .showcase-bar.is-hidden { display: none; }
  .showcase-bar[data-tier="elite"] { background: var(--tier-elite); }
  .showcase-bar[data-tier="ontrack"] { background: var(--tier-ontrack); }
  .showcase-bar[data-tier="building"] { background: var(--tier-building); }
  .showcase-bar[data-tier="behind"] { background: var(--tier-behind); }

  .empty-note { color: var(--text-muted); text-align: center; padding: 40px 0; }

  footer {
    text-align: center; color: var(--text-muted); font-size: 0.74rem;
    margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border);
  }

  /* Stat card popup */
  .overlay {
    position: fixed; inset: 0; background: rgba(4,6,9,0.72); display: flex;
    align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  .overlay[hidden] { display: none; }
  .stat-card {
    width: 320px; max-width: 100%; background: linear-gradient(180deg, #171f2a, #0f141b);
    border: 1px solid var(--accent-dim); border-radius: 16px; padding: 22px 22px 18px;
    box-shadow: 0 0 0 1px rgba(255,159,67,0.08), 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
  }
  .stat-card-close {
    position: absolute; top: 12px; right: 14px; background: none; border: none;
    color: var(--text-muted); font-size: 1.1rem; cursor: pointer; line-height: 1;
  }
  .stat-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .stat-card-avatar {
    width: 44px; height: 44px; border-radius: 50%; background: var(--panel-2);
    display: flex; align-items: center; justify-content: center; font-weight: 700;
    color: var(--accent); border: 1px solid var(--accent-dim); flex-shrink: 0;
    background-size: cover; background-position: center;
  }
  .stat-card-id { font-size: 0.72rem; letter-spacing: 0.06em; color: var(--text-muted); text-transform: uppercase; }
  .stat-card-id strong { color: var(--text-primary); font-size: 0.85rem; letter-spacing: 0.03em; display: block; }
  .stat-card-tier {
    display: inline-block; margin-top: 4px; font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.08em; padding: 2px 8px; border-radius: 999px; text-transform: uppercase;
  }
  .stat-card-tier[data-tier="elite"] { color: var(--tier-elite); background: rgba(255,159,67,0.12); }
  .stat-card-tier[data-tier="ontrack"] { color: var(--tier-ontrack); background: rgba(79,209,197,0.12); }
  .stat-card-tier[data-tier="building"] { color: var(--tier-building); background: rgba(124,139,161,0.14); }
  .stat-card-tier[data-tier="behind"] { color: var(--tier-behind); background: rgba(224,85,90,0.12); }
  .stat-card-mode-icon { width: 16px; height: 16px; vertical-align: -3px; }
  .stat-card-location { display: block; margin-top: 4px; font-size: 0.74rem; color: var(--text-muted); }

  .stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.82rem;
  }
  .stat-row span:first-child { color: var(--text-muted); letter-spacing: 0.02em; }
  .stat-row span:last-child { font-variant-numeric: tabular-nums; font-weight: 600; }
  .stat-row.is-positive span:last-child { color: var(--tier-ontrack); }
  .stat-row.is-negative span:last-child { color: var(--tier-behind); }

  .consistency-block { margin-top: 14px; }
  .consistency-label { display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 6px; }
  .consistency-label strong { font-variant-numeric: tabular-nums; }
  .consistency-track { height: 6px; background: var(--panel-2); border-radius: 4px; overflow: hidden; }
  .consistency-fill { height: 100%; background: linear-gradient(90deg, var(--tier-behind), var(--tier-elite)); border-radius: 4px; }

  /* Deliberately unobtrusive -- this is a small escape hatch for admin use,
     not a feature regular visitors are meant to notice. */
  .admin-corner-btn {
    position: fixed; bottom: 10px; right: 10px; z-index: 40;
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    font-size: 0.68rem; padding: 4px 10px; border-radius: 999px; cursor: pointer; opacity: 0.5;
  }
  .admin-corner-btn:hover { opacity: 1; }
  .admin-login-card { width: 280px; }
  .admin-field { display: block; margin-bottom: 10px; font-size: 0.78rem; color: var(--text-muted); }
  .admin-field input {
    display: block; width: 100%; margin-top: 4px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; color: var(--text-primary); font-size: 0.85rem; box-sizing: border-box;
  }
  .assign-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.05); }
  .btn-assign {
    display: block; width: 100%; text-align: center; text-decoration: none; box-sizing: border-box;
    background: var(--accent); color: #0a0d12; font-weight: 600; font-size: 0.82rem;
    border: none; border-radius: 8px; padding: 9px; cursor: pointer;
  }
  .btn-assign:disabled { background: var(--panel-2); color: var(--text-muted); cursor: default; }
  .btn-assign.is-download { background: var(--tier-ontrack); }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>Winfinity <span class="accent">Progress Showcase</span></h1>
    <p>A live look at real member progress across the Nexus community.</p>
  </header>

  <nav class="tabs" id="metricTabs"></nav>

  <div class="filter-row">
    <label class="sort-toggle">
      <input type="checkbox" id="sortByHeight">
      <span>Sort by progress</span>
    </label>
    <label class="sort-toggle">
      <input type="checkbox" id="hideFiltered">
      <span>Hide filtered-out users</span>
    </label>
    <select class="location-select" id="locationFilter">
      <option value="">All locations</option>
    </select>
    <div class="filter-range-group" id="filterRangeGroup">
      <span>Filter range:</span>
      <div class="filter-range">
        <input type="range" id="filterMin">
        <input type="range" id="filterMax">
      </div>
      <span class="filter-values" id="filterValues"></span>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-card-head">
      <h2 id="chartTitle">Daily Steps</h2>
      <span id="chartCount"></span>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--tier-elite)"></span>Elite</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--tier-ontrack)"></span>On Track</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--tier-building)"></span>Building</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--tier-behind)"></span>Needs Attention</span>
    </div>
    <div class="bars-scroll" id="barsScroll"></div>
  </div>

  <footer>Showcase includes both real member results and illustrative sample data. Tap any bar to view a member's summary.</footer>
</div>

<button type="button" class="admin-corner-btn" id="btnAdminCorner">Admin</button>

<div class="overlay" id="statOverlay" hidden>
  <div class="stat-card" id="statCard"></div>
</div>

<div class="overlay" id="adminLoginOverlay" hidden>
  <div class="stat-card admin-login-card">
    <button type="button" class="stat-card-close" id="btnCloseAdminLogin" aria-label="Close">&times;</button>
    <h3 style="margin:0 0 14px;font-size:0.95rem;">Admin Login</h3>
    <label class="admin-field"><span>Digital ID</span><input type="text" id="adminLoginId" autocapitalize="characters"></label>
    <label class="admin-field"><span>Password</span><input type="password" id="adminLoginPassword"></label>
    <button type="button" class="tab-btn is-active" id="btnAdminLoginSubmit" style="width:100%;margin-top:6px;">Log In</button>
    <p class="empty-note" id="adminLoginNote" style="padding:8px 0 0;"></p>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const METRICS = [
  { key: 'steps', label: 'Daily Steps', domain: [0, 20000], higherIsBetter: true, format: v => Math.round(v).toLocaleString() },
  { key: 'volume_lifted', label: 'Volume Lifted', domain: [0, 8000], higherIsBetter: true, format: v => Math.round(v).toLocaleString() + ' kg' },
  { key: 'weight_progress_pct', label: 'Weight Progress', domain: [-10, 10], higherIsBetter: false, format: v => (v > 0 ? '+' : '') + v + '%' },
  { key: 'furthest_run_km', label: 'Furthest Run', domain: [0, 20], higherIsBetter: true, format: v => Number(v).toFixed(1) + ' km' },
  { key: 'fastest_run_pace_sec', label: 'Fastest Pace', domain: [180, 600], higherIsBetter: false, format: v => formatPace(v) },
  { key: 'conscientious_score', label: 'Consistency Score', domain: [0, 100], higherIsBetter: true, format: v => Math.round(v) + '%' },
];

function formatPace(sec) {
  const m = Math.floor(sec / 60), s = Math.round(sec % 60);
  return m + ':' + String(s).padStart(2, '0') + '/km';
}

function tierFor(normalizedPct) {
  if (normalizedPct >= 80) return 'elite';
  if (normalizedPct >= 55) return 'ontrack';
  if (normalizedPct >= 30) return 'building';
  return 'behind';
}
const TIER_LABEL = { elite: 'Elite Performer', ontrack: 'On Track', building: 'Building Momentum', behind: 'Needs Attention' };

const FLAG_EMOJI = {
  'Philippines': '🇵🇭', 'United States': '🇺🇸', 'Japan': '🇯🇵', 'Brazil': '🇧🇷',
  'Germany': '🇩🇪', 'India': '🇮🇳', 'Australia': '🇦🇺', 'Canada': '🇨🇦',
  'South Korea': '🇰🇷', 'United Kingdom': '🇬🇧', 'Mexico': '🇲🇽', 'Nigeria': '🇳🇬',
  'Sweden': '🇸🇪', 'Italy': '🇮🇹', 'South Africa': '🇿🇦', 'Indonesia': '🇮🇩',
  'France': '🇫🇷', 'Vietnam': '🇻🇳', 'Spain': '🇪🇸', 'Kenya': '🇰🇪',
};
const MODE_ICON = { beginner: 'mode-beginner.png', warrior: 'mode-warrior.png', spartan: 'mode-spartan.png', demigod: 'mode-demigod.png' };

let allRows = [];
let activeMetricIndex = 0;
let filterMinVal = null, filterMaxVal = null;
let sortByHeight = false;
let locationFilterVal = '';

async function loadData() {
  const barsEl = document.getElementById('barsScroll');
  try {
    const { data, error } = await sb.rpc('get_public_showcase_data');
    if (error) throw error;
    allRows = data || [];
  } catch (e) {
    barsEl.innerHTML = '<p class="empty-note">Progress data is temporarily unavailable — check back soon.</p>';
    return;
  }
  populateLocationFilter();
  renderTabs();
  renderMetric(0);
}

function populateLocationFilter() {
  const select = document.getElementById('locationFilter');
  const locations = [...new Set(allRows.map(r => r.location).filter(Boolean))].sort();
  select.innerHTML = '<option value="">All locations</option>' +
    locations.map(loc => `<option value="${escapeHtml(loc)}">${escapeHtml(FLAG_EMOJI[loc] || '')} ${escapeHtml(loc)}</option>`).join('');
  select.addEventListener('change', () => {
    locationFilterVal = select.value;
    applyFilter();
  });
}

function renderTabs() {
  const tabsEl = document.getElementById('metricTabs');
  tabsEl.innerHTML = METRICS.map((m, i) =>
    `<button type="button" class="tab-btn${i === 0 ? ' is-active' : ''}" data-metric-index="${i}">${escapeHtml(m.label)}</button>`
  ).join('');
  tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('is-active', b === btn));
      renderMetric(Number(btn.dataset.metricIndex));
    });
  });
}

function renderMetric(index) {
  activeMetricIndex = index;
  const metric = METRICS[index];
  document.getElementById('chartTitle').textContent = metric.label;

  const rows = allRows.filter(r => r[metric.key] != null);
  document.getElementById('chartCount').textContent = rows.length + ' member' + (rows.length === 1 ? '' : 's');

  // Default order is alphabetical by code name -- bar heights (driven by
  // each user's actual value) then land in a naturally scattered pattern
  // instead of a predictable best-to-worst staircase. "Sort by progress"
  // switches to the ranked order on demand.
  if (sortByHeight) {
    rows.sort((a, b) => metric.higherIsBetter ? b[metric.key] - a[metric.key] : a[metric.key] - b[metric.key]);
  } else {
    rows.sort((a, b) => a.code_name.localeCompare(b.code_name));
  }

  const [domainMin, domainMax] = metric.domain;
  filterMinVal = domainMin;
  filterMaxVal = domainMax;
  const filterMinEl = document.getElementById('filterMin');
  const filterMaxEl = document.getElementById('filterMax');
  filterMinEl.min = filterMaxEl.min = domainMin;
  filterMinEl.max = filterMaxEl.max = domainMax;
  filterMinEl.step = filterMaxEl.step = (domainMax - domainMin) / 100;
  filterMinEl.value = domainMin;
  filterMaxEl.value = domainMax;
  updateFilterLabel(metric);

  const barsEl = document.getElementById('barsScroll');
  if (!rows.length) {
    barsEl.innerHTML = '<p class="empty-note">No data yet for this metric.</p>';
    return;
  }
  barsEl.innerHTML = rows.map(r => {
    const raw = r[metric.key];
    const rawClamped = Math.min(domainMax, Math.max(domainMin, raw));
    const normalized = metric.higherIsBetter
      ? (rawClamped - domainMin) / (domainMax - domainMin) * 100
      : (domainMax - rawClamped) / (domainMax - domainMin) * 100;
    const tier = tierFor(normalized);
    const heightPct = Math.max(4, normalized);
    return `<button type="button" class="showcase-bar" data-tier="${tier}" data-value="${raw}" data-location="${escapeHtml(r.location || '')}"
      style="height:${heightPct}%" data-public-id="${escapeHtml(r.public_id)}"
      aria-label="${escapeHtml(r.code_name)}: ${escapeHtml(metric.format(raw))}"></button>`;
  }).join('');

  barsEl.querySelectorAll('.showcase-bar').forEach((barEl, i) => {
    // mouseenter opens it for anyone with a real cursor -- click stays too,
    // since touch devices have no hover state and fire click instead.
    barEl.addEventListener('mouseenter', () => openStatCard(rows[i]));
    barEl.addEventListener('click', () => openStatCard(rows[i]));
  });

  applyFilter();
}

function updateFilterLabel(metric) {
  document.getElementById('filterValues').textContent =
    `${metric.format(filterMinVal)} – ${metric.format(filterMaxVal)}`;
}

let hideFilteredOut = false;

function applyFilter() {
  const metric = METRICS[activeMetricIndex];
  document.querySelectorAll('.showcase-bar').forEach(el => {
    const v = Number(el.dataset.value);
    const outOfRange = v < filterMinVal || v > filterMaxVal;
    const wrongLocation = locationFilterVal && el.dataset.location !== locationFilterVal;
    const filteredOut = outOfRange || wrongLocation;
    // Dimmed-in-place (default) keeps every bar's horizontal position
    // stable; "Hide filtered-out users" instead removes them from flow
    // entirely so the remaining bars sit compactly side by side.
    el.classList.toggle('is-filtered-out', filteredOut && !hideFilteredOut);
    el.classList.toggle('is-hidden', filteredOut && hideFilteredOut);
  });
  updateFilterLabel(metric);
}

document.getElementById('filterMin').addEventListener('input', e => {
  filterMinVal = Math.min(Number(e.target.value), filterMaxVal);
  applyFilter();
});
document.getElementById('filterMax').addEventListener('input', e => {
  filterMaxVal = Math.max(Number(e.target.value), filterMinVal);
  applyFilter();
});
document.getElementById('sortByHeight').addEventListener('change', e => {
  sortByHeight = e.target.checked;
  renderMetric(activeMetricIndex);
});
document.getElementById('hideFiltered').addEventListener('change', e => {
  hideFilteredOut = e.target.checked;
  applyFilter();
});

function openStatCard(row) {
  const consistency = row.conscientious_score != null ? row.conscientious_score : (row.logging_consistency_pct || 0);
  const tier = tierFor(consistency);
  const rows = [];
  if (row.weight_progress_pct != null) {
    rows.push(['Weightloss Trend', (row.weight_progress_pct > 0 ? '+' : '') + row.weight_progress_pct + '%', row.weight_progress_pct <= 0]);
  }
  if (row.weight_lost_kg != null) rows.push(['Total Weight Loss', row.weight_lost_kg + ' kg', true]);
  if (row.steps != null) rows.push(['Daily Steps', Math.round(row.steps).toLocaleString(), null]);
  if (row.avg_calories != null) rows.push(['Calories Consumed', row.avg_calories.toLocaleString() + ' kcal', null]);
  if (row.avg_protein_g != null) rows.push(['Protein Intake', row.avg_protein_g + ' g', null]);
  if (row.volume_lifted != null) rows.push(['Volume Lifted', Math.round(row.volume_lifted).toLocaleString() + ' ' + (row.volume_unit || 'kg'), null]);
  if (row.furthest_run_km != null) rows.push(['Furthest Run', Number(row.furthest_run_km).toFixed(1) + ' km', null]);
  if (row.fastest_run_pace_sec != null) rows.push(['Fastest Pace', formatPace(row.fastest_run_pace_sec), null]);
  if (row.logging_consistency_pct != null) rows.push(['Habitual Logging', row.logging_consistency_pct + '%', null]);

  const initial = (row.code_name || '?').trim().charAt(0).toUpperCase();
  const avatarStyle = row.avatar_data_url ? ` style="background-image:url('${escapeHtml(row.avatar_data_url)}')"` : '';
  const modeIcon = MODE_ICON[row.fitness_mode];
  const modeIconHtml = modeIcon ? `<img class="stat-card-mode-icon" src="icons/${modeIcon}" alt="${escapeHtml(row.fitness_mode)}" title="${escapeHtml(row.fitness_mode)}">` : '';
  const locationHtml = row.location ? `<span class="stat-card-location">${escapeHtml(FLAG_EMOJI[row.location] || '')} ${escapeHtml(row.location)}</span>` : '';

  document.getElementById('statCard').innerHTML = `
    <button type="button" class="stat-card-close" aria-label="Close">&times;</button>
    <div class="stat-card-head">
      <span class="stat-card-avatar"${avatarStyle}>${row.avatar_data_url ? '' : escapeHtml(initial)}</span>
      <div class="stat-card-id">
        Neural ID
        <strong>${escapeHtml(row.public_id)} ${modeIconHtml}</strong>
        <span class="stat-card-tier" data-tier="${tier}">${TIER_LABEL[tier]}</span>
        ${locationHtml}
      </div>
    </div>
    ${rows.map(([label, value, positive]) =>
      `<div class="stat-row${positive === true ? ' is-positive' : positive === false ? ' is-negative' : ''}"><span>${escapeHtml(label)}</span><span>${escapeHtml(value)}</span></div>`
    ).join('')}
    <div class="consistency-block">
      <div class="consistency-label"><span>Consistency Score</span><strong>${Math.round(consistency)}</strong></div>
      <div class="consistency-track"><div class="consistency-fill" style="width:${Math.min(100, Math.max(0, consistency))}%"></div></div>
    </div>
    ${adminSession && !row.is_demo ? '<div class="assign-section" id="assignSection"><button type="button" class="btn-assign" id="btnAssign" disabled>Checking status…</button></div>' : ''}
  `;
  document.getElementById('statCard').querySelector('.stat-card-close').addEventListener('click', closeStatCard);
  document.getElementById('statOverlay').hidden = false;
  if (adminSession && !row.is_demo) refreshAssignSection(row.public_id);
}
function closeStatCard() { document.getElementById('statOverlay').hidden = true; }
document.getElementById('statOverlay').addEventListener('click', e => {
  if (e.target.id === 'statOverlay') closeStatCard();
});

// ---------------------------------------------------------------------
// Admin: "Assess for New Assignment" -- only ever shown for real (non-demo)
// users, only once an admin has logged in on this page. Every RPC call
// re-verifies the admin password server-side (no server-side session
// exists anywhere in this app), same pattern the main app's own admin
// tools already use.
// ---------------------------------------------------------------------
let adminSession = null;
try {
  const saved = localStorage.getItem('wft_showcase_admin_session');
  if (saved) adminSession = JSON.parse(saved);
} catch (e) { /* ignore corrupt value */ }

document.getElementById('btnAdminCorner').addEventListener('click', () => {
  document.getElementById('adminLoginNote').textContent = '';
  document.getElementById('adminLoginId').value = '';
  document.getElementById('adminLoginPassword').value = '';
  document.getElementById('adminLoginOverlay').hidden = false;
});
document.getElementById('btnCloseAdminLogin').addEventListener('click', () => {
  document.getElementById('adminLoginOverlay').hidden = true;
});
document.getElementById('adminLoginOverlay').addEventListener('click', e => {
  if (e.target.id === 'adminLoginOverlay') document.getElementById('adminLoginOverlay').hidden = true;
});
document.getElementById('btnAdminLoginSubmit').addEventListener('click', async () => {
  const id = document.getElementById('adminLoginId').value.trim();
  const password = document.getElementById('adminLoginPassword').value;
  const note = document.getElementById('adminLoginNote');
  if (!id || !password) { note.textContent = 'Enter both Digital ID and password.'; return; }
  note.textContent = 'Checking…';
  try {
    const { error } = await sb.rpc('verify_admin_login', { p_digital_id: id, p_password: password });
    if (error) throw error;
    adminSession = { digitalId: id, password };
    localStorage.setItem('wft_showcase_admin_session', JSON.stringify(adminSession));
    document.getElementById('adminLoginOverlay').hidden = true;
  } catch (e) {
    note.textContent = 'Incorrect Digital ID or password.';
  }
});

async function refreshAssignSection(publicId) {
  const btn = document.getElementById('btnAssign');
  if (!btn) return;
  try {
    const { data, error } = await sb.rpc('get_assessment_request_status', {
      p_admin_digital_id: adminSession.digitalId, p_admin_password: adminSession.password, p_target_public_id: publicId,
    });
    if (error) throw error;
    const row = Array.isArray(data) ? data[0] : null;
    if (row && row.status === 'ready' && row.zip_url) {
      btn.outerHTML = `<a class="btn-assign is-download" href="${escapeHtml(row.zip_url)}" target="_blank" rel="noopener">Download Assessment Zip</a>`;
    } else if (row && row.status === 'pending') {
      btn.textContent = 'Requested — waiting for sync…';
      btn.disabled = true;
    } else {
      btn.textContent = 'Assess for New Assignment';
      btn.disabled = false;
      btn.addEventListener('click', () => requestAssessment(publicId));
    }
  } catch (e) {
    btn.textContent = 'Assess for New Assignment';
    btn.disabled = false;
    btn.addEventListener('click', () => requestAssessment(publicId));
  }
}

async function requestAssessment(publicId) {
  const btn = document.getElementById('btnAssign');
  btn.disabled = true;
  btn.textContent = 'Sending request…';
  try {
    const { error } = await sb.rpc('request_assessment', {
      p_admin_digital_id: adminSession.digitalId, p_admin_password: adminSession.password, p_target_public_id: publicId,
    });
    if (error) throw error;
    btn.textContent = 'Requested — waiting for sync…';
  } catch (e) {
    btn.textContent = 'Could not send request — try again';
    btn.disabled = false;
  }
}

loadData();
</script>
</body>
</html>
